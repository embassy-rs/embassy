[package]
name = "embassy-net-esp-hosted"
version = "0.3.0"
edition = "2024"
description = "embassy-net driver for ESP-Hosted"
keywords = ["embedded", "esp-hosted", "embassy-net", "embedded-hal-async", "wifi"]
categories = ["embedded", "hardware-support", "no-std", "network-programming", "asynchronous"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/embassy-rs/embassy"
documentation = "https://docs.embassy.dev/embassy-net-esp-hosted"

[package.metadata.embassy]
build = [
    {target = "thumbv7em-none-eabi", features = ["esp-hosted-fg"]},
    {target = "thumbv7em-none-eabi", features = ["esp-hosted-mcu"]},
    {target = "thumbv7em-none-eabi", features = ["esp-hosted-fg", "esp-hosted-mcu"]},
    {target = "thumbv7em-none-eabi", features = ["esp-hosted-fg", "esp-hosted-mcu", "log"]},
    {target = "thumbv7em-none-eabi", features = ["esp-hosted-fg", "esp-hosted-mcu", "defmt"]},
]

[features]
defmt = ["dep:defmt", "heapless/defmt"]
log = ["dep:log"]

#! ### Hosted firmware support
#! At least one of the following features must be enabled. When both are enabled,
#! the active version will be detected during device initialization. Some features
#! may only be available in one version or the other.

## Enable esp-hosted-fg support
esp-hosted-fg = []
## Enable esp-hosted-mcu support
esp-hosted-mcu = []

[dependencies]
defmt = { version = "1.0.1", optional = true }
log = { version = "0.4.14", optional = true }

embassy-time = { version = "0.5.1", path = "../embassy-time" }
embassy-sync = { version = "0.8.0", path = "../embassy-sync"}
embassy-futures = { version = "0.1.2", path = "../embassy-futures"}
embassy-net-driver-channel = { version = "0.4.0", path = "../embassy-net-driver-channel"}

embedded-hal = { version = "1.0" }
embedded-hal-async = { version = "1.0" }

delegate = "0.13"
micropb = { version = "0.6.0", default-features = false, features = ["container-heapless-0-9", "encode", "decode", "enable-64bit"] }
heapless = "0.9"
document-features = "0.2.7"

[package.metadata.embassy_docs]
src_base = "https://github.com/embassy-rs/embassy/blob/embassy-net-esp-hosted-v$VERSION/embassy-net-esp-hosted/src/"
src_base_git = "https://github.com/embassy-rs/embassy/blob/$COMMIT/embassy-net-esp-hosted/src/"
target = "thumbv7em-none-eabi"
features = ["defmt", "esp-hosted-fg", "esp-hosted-mcu"]

[package.metadata.docs.rs]
features = ["defmt"]
