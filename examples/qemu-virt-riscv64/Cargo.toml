[package]
edition = "2024"
name = "embassy-qemu-virt-riscv64-examples"
version = "0.1.0"
license = "MIT OR Apache-2.0"
publish = false

[dependencies]
critical-section = { version = "1.2.0", features = ["restore-state-bool"] }
embassy-executor = { version = "0.10.0", path = "../../embassy-executor", features = ["platform-riscv64", "executor-thread"] }
embassy-futures = { version = "0.1.2", path = "../../embassy-futures" }
embassy-sync = { version = "0.8.0", path = "../../embassy-sync" }

riscv-rt = "0.12.2"
riscv = { version = "0.11.1", features = ["critical-section-single-hart"] }
semihosting = { version = "0.1.25", features = ["stdio"] }

[profile.dev]
panic = "abort"

[profile.release]
debug = 2
panic = "abort"

[package.metadata.embassy]
build = [
  { target = "riscv64imac-unknown-none-elf", artifact-dir = "out/examples/qemu-virt-riscv64imac" },
  { target = "riscv64gc-unknown-none-elf",   artifact-dir = "out/examples/qemu-virt-riscv64gc" },
]
