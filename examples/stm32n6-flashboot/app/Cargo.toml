[package]
edition = "2024"
name = "stm32n6-app"
version = "0.1.0"
license = "MIT OR Apache-2.0"
publish = false

[dependencies]
embassy-executor = { version = "0.10.0", path = "../../../embassy-executor", features = ["platform-cortex-m", "executor-thread"] }
embassy-stm32 = { version = "0.6.0", path = "../../../embassy-stm32", features = ["defmt", "stm32n657x0", "time", "time-driver-any", "exti"] }
embassy-time = { version = "0.5.1", path = "../../../embassy-time", features = ["defmt", "defmt-timestamp-uptime", "tick-hz-32_768"] }
defmt = "1.0.1"
defmt-rtt = "1.1.0"
panic-probe = { version = "1.0.0", features = ["print-defmt"] }

cortex-m = { version = "0.7.7", features = ["inline-asm", "critical-section-single-core"] }
cortex-m-rt = { version = "0.7.5", features = ["set-sp", "set-vtor"] }

[features]
default = ["dk"]
dk = []
nucleo = []

[package.metadata.embassy]
build = [
  { target = "thumbv8m.main-none-eabihf", artifact-dir = "out/examples/stm32n6-flashboot/app" }
]
