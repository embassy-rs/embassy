[package]
edition = "2024"
name = "touch-hall-common"
version = "0.1.0"
license = "MIT OR Apache-2.0"
publish = false

description = "Shared JSON-driven hall lighting UI config and CAN bitmask protocol"

[features]
default = []
rhai = ["dep:rhai"]
log = ["dep:log"]
defmt = ["dep:defmt"]

[dependencies]
log = { version = "0.4", optional = true }
defmt = { version = "1", optional = true }
rhai = { git = "https://github.com/rhaiscript/rhai.git", version = "1", optional = true, default-features = false, features = [
    "no_std",
    "no_optimize",
    "no_custom_syntax",
    "only_i32",
    "no_module",
    "no_closure",
    "no_position",
] }

[build-dependencies]
serde_json = "1"
