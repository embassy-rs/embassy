[package]
edition = "2024"
name = "embassy-stm32h573i-dk-examples"
version = "0.1.0"
license = "MIT OR Apache-2.0"
publish = false

[dependencies]
embassy-stm32 = { path = "../../embassy-stm32", features = ["defmt", "stm32h573ii", "memory-x", "time-driver-any", "exti", "unstable-pac"] }
embassy-sync = { path = "../../embassy-sync", features = ["defmt"] }
embassy-executor = { path = "../../embassy-executor", features = ["platform-cortex-m", "executor-thread", "defmt"] }
embassy-time = { path = "../../embassy-time", features = ["defmt", "defmt-timestamp-uptime", "tick-hz-32_768"] }
embassy-futures = { path = "../../embassy-futures" }

defmt = "1.0.1"
defmt-rtt = "1.0.0"

cortex-m = { version = "0.7.6", features = ["inline-asm", "critical-section-single-core"] }
cortex-m-rt = "0.7.0"
embedded-can = { version = "0.4" }
panic-probe = { version = "1.0.0", features = ["print-defmt"] }
static_cell = "2"
critical-section = "1.1"

# CANopenNode Rust port (rust/ workspace in the CANopenNode repo).
canopen-core = { git = "https://github.com/protronic/CANopenNode", branch = "claude/canopennode-rust-port-30sh0x" }
canopen-embassy = { git = "https://github.com/protronic/CANopenNode", branch = "claude/canopennode-rust-port-30sh0x" }
canopen-example-od = { git = "https://github.com/protronic/CANopenNode", branch = "claude/canopennode-rust-port-30sh0x" }

# canopen-embassy depends on embassy-time/embassy-futures from crates.io;
# unify them with the in-repo versions so only one embassy-time is linked.
[patch.crates-io]
embassy-time = { path = "../../embassy-time" }
embassy-futures = { path = "../../embassy-futures" }

[profile.release]
debug = 2

