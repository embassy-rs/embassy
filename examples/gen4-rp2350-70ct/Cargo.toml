[package]
edition = "2024"
name = "embassy-gen4-rp2350-70ct-examples"
version = "0.1.0"
license = "MIT OR Apache-2.0"
publish = false

description = "rlvgl + FT5446 touch for 4D Systems gen4-RP2350-70CT (PIO RGB from gen4_rp2350_lvgl)"

[dependencies]
embassy-executor = { version = "0.10.0", path = "../../embassy-executor", features = ["platform-cortex-m", "executor-thread", "defmt"] }
embassy-futures = { version = "0.1.2", path = "../../embassy-futures" }
embassy-rp = { version = "0.10.0", path = "../../embassy-rp", features = ["defmt", "unstable-pac", "time-driver", "critical-section-impl", "rp235xb", "binary-info"] }
embassy-sync = { version = "0.8.0", path = "../../embassy-sync", features = ["defmt"] }
embassy-time = { version = "0.5.1", path = "../../embassy-time", features = ["defmt", "defmt-timestamp-uptime"] }

defmt = "1.0.1"
defmt-rtt = "1.0.0"
cortex-m = { version = "0.7.6", features = ["inline-asm"] }
cortex-m-rt = "0.7.0"
panic-probe = { version = "1.0.0", features = ["print-defmt"] }
fixed = "1.28.0"
static_cell = "2"
embedded-alloc = { version = "0.6.0", features = ["llff"] }

rlvgl = { version = "0.2.4", default-features = false, optional = true }

# oxivgl — safe Rust bindings over C LVGL v9.5 (compiled from source via
# oxivgl-sys with `conf/lv_conf.h`). Gated behind the `oxivgl-demo` feature.
oxivgl = { version = "0.5.0", default-features = false, optional = true }
oxivgl-sys = { version = "0.2.2", default-features = false, optional = true }

[features]
# Each UI demo is gated behind its own feature so the rest of the board support
# (PIO RGB scan-out, FT5446 touch, DMA self-test) builds without pulling in any
# LVGL dependency. The pure-Rust rlvgl demo stays on by default so
# `cargo run --bin rlvgl_widget_demo` keeps working out of the box; the OxivGL
# (C LVGL) demo is opt-in because it compiles the LVGL C sources.
default = ["rlvgl-demo"]
rlvgl-demo = ["dep:rlvgl"]
oxivgl-demo = ["dep:oxivgl", "dep:oxivgl-sys"]

[[bin]]
name = "rlvgl_widget_demo"
path = "src/bin/rlvgl_widget_demo.rs"
required-features = ["rlvgl-demo"]

[[bin]]
name = "oxivgl_widget_demo"
path = "src/bin/oxivgl_widget_demo.rs"
required-features = ["oxivgl-demo"]

[[bin]]
name = "dma_selftest"
path = "src/bin/dma_selftest.rs"

[profile.release]
debug = 2

[build-dependencies]

[patch.crates-io]
embassy-time = { path = "../../embassy-time" }
embassy-sync = { path = "../../embassy-sync" }
embassy-futures = { path = "../../embassy-futures" }
# Vendored oxivgl 0.5.0 with the example PNG-asset conversion removed (it relies
# on LVGL's LVGLImage.py + a pypng version that broke `asRGBA8`); the demo uses
# none of those images.
oxivgl = { path = "vendor/oxivgl" }
# Vendored oxivgl-sys 0.2.2 patched for bare-metal thumb cross-compilation:
# link SDL2 only on the native host and point bindgen at the arm-none-eabi
# newlib headers. The upstream crates.io 0.2.2 only supports host/ESP builds.
oxivgl-sys = { path = "vendor/oxivgl-sys" }

[package.metadata.embassy]
build = [
  { target = "thumbv8m.main-none-eabihf", artifact-dir = "out/examples/gen4-rp2350-70ct" }
]
