[package]
name = "embassy-efr32mg22-examples"
edition = "2024"
version = "0.1.0"
license = "MIT OR Apache-2.0"
publish = false

[dependencies]
embassy-silabs   = { path = "../../embassy-silabs", features = ["defmt", "efr32mg22c224f512im40", "time-driver-any", "unstable-pac"] }
embassy-sync     = { path = "../../embassy-sync", features = ["defmt"] }
embassy-executor = { path = "../../embassy-executor", features = ["platform-cortex-m", "executor-thread", "defmt"] }
embassy-time     = { path = "../../embassy-time", features = ["defmt", "defmt-timestamp-uptime", "tick-hz-1_000_000"] }
embassy-futures  = { path = "../../embassy-futures" }

cortex-m         = { version = "0.7.6", features = ["inline-asm", "critical-section-single-core"] }
cortex-m-rt      = "0.7"
defmt            = "1"
defmt-rtt        = "1"
panic-probe      = { version = "1", features = ["print-defmt"] }

[profile.release]
debug = 2

[package.metadata.embassy]
build = [
    { target = "thumbv8m.main-none-eabihf", artifact-dir = "out/examples/efr32mg22" },
]
