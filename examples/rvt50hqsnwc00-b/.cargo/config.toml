[target.'cfg(all(target_arch = "arm", target_os = "none"))']
# Riverdi RVT50HQSNWC00-B uses STM32U5A9NJH6Q
runner = "probe-rs run --chip STM32U5A9NJHxQ --preverify"

[build]
target = "thumbv8m.main-none-eabihf"

[target.thumbv8m.main-none-eabihf]
linker = "rust-lld"

[env]
DEFMT_LOG = "info"
DEP_LV_CONFIG_PATH = { value = "lvgl", relative = true }

# Cross C compiler used by `cc` (for `lvgl-port/port.c`) and `lvgl-sys` (the
# vendored LVGL C sources). Defaults assume `arm-none-eabi-gcc` is on PATH; on
# Debian/Ubuntu install it with `apt install gcc-arm-none-eabi`.
"CC_thumbv8m.main-none-eabihf" = "arm-none-eabi-gcc"
"CFLAGS_thumbv8m.main-none-eabihf" = "-mcpu=cortex-m33 -mthumb -mfloat-abi=hard -mfpu=fpv5-sp-d16"
"AR_thumbv8m.main-none-eabihf" = "arm-none-eabi-ar"

# `lvgl-sys` runs bindgen with `BINDGEN_EXTRA_CLANG_ARGS` to find the cross
# libc headers (`string.h`, …). The path is host-specific (Debian's
# update-alternatives, picolibc, ARM tarball, PlatformIO, Homebrew, …), so we
# cannot hard-code it here. Run once per shell:
#
#     source scripts/lvgl-env.sh
#
# The script queries `arm-none-eabi-gcc` for its include path. To skip the
# script, set BINDGEN_EXTRA_CLANG_ARGS yourself or copy a snippet from
# `.cargo/config.toml.example` into this file.
