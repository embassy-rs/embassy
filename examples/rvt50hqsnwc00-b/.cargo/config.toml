[target.'cfg(all(target_arch = "arm", target_os = "none"))']
# Riverdi RVT50HQSNWC00-B uses STM32U5A9NJH6Q
runner = "probe-rs run --chip STM32U5A9NJHxQ --preverify"

[build]
target = "thumbv8m.main-none-eabihf"

[target.thumbv8m.main-none-eabihf]
linker = "rust-lld"

[env]
DEFMT_LOG = "debug"
# Required by oxivgl-sys when building with `--features oxivgl`
DEP_LV_CONFIG_PATH = { value = "conf", relative = true }
LVGL_FONTS_DIR = { value = "fonts", relative = true }
