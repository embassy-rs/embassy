[dependencies.cfg-if]
version = "1"

[dependencies.critical-section]
version = "1"

[dependencies.defmt]
version = "1.0.1"
optional = true

[dependencies.embassy-sync]
version = "0.7.2"

[dependencies.embassy-time]
version = "0.5.0"

[dependencies.esp-hal]
version = "1.0.0"
features = ["unstable"]
optional = true

[dependencies.heapless]
version = "0.9.1"
features = ["nightly"]

[dependencies.log-04]
version = "0.4"
optional = true
package = "log"

[dependencies.oxivgl_sys]
version = "0.1.2"
default-features = false
package = "oxivgl-sys"

[dependencies.png]
version = "0.17"
optional = true

[dependencies.thiserror-no-std]
version = "2.0.2"

[dev-dependencies.oxivgl_sys]
version = "0.1.2"
default-features = false
package = "oxivgl-sys"

[build-dependencies.oxivgl-build]
version = "0.1.0"

[target.'cfg(target_arch = "xtensa")'.dev-dependencies.embassy-executor]
version = "0.9.1"
features = ["nightly"]

[target.'cfg(target_arch = "xtensa")'.dev-dependencies.esp-bootloader-esp-idf]
version = "0.4.0"
features = ["esp32"]

[target.'cfg(target_arch = "xtensa")'.dev-dependencies.esp-hal]
version = "=1.0.0"
features = [
    "esp32",
    "unstable",
]

[target.'cfg(target_arch = "xtensa")'.dev-dependencies.esp-rtos]
version = "0.2.0"
features = [
    "esp32",
    "embassy",
]

[profile.dev]
opt-level = "s"

[profile.release]
opt-level = "s"
lto = "fat"
codegen-units = 1
debug = 2
debug-assertions = false
overflow-checks = true
incremental = false
