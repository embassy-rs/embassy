[package]
edition = "2024"
name = "oxivgl"
version = "0.1.2"
authors = ["emobotics-dev"]
build = "build.rs"
exclude = [
    ".devcontainer/",
    ".github/",
    "CLAUDE.md",
    "docs/",
    "examples/doc/screenshots/",
    "examples/common/",
    "run_*.sh",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Safe no_std Rust bindings for LVGL — embedded GUI on ESP32 and host SDL2"
homepage = "https://github.com/emobotics-dev/oxivgl"
documentation = "https://docs.rs/oxivgl"
readme = "README.md"
keywords = [
    "lvgl",
    "embedded-gui",
    "esp32",
    "no-std",
    "ui",
]
categories = [
    "embedded",
    "no-std",
    "gui",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/emobotics-dev/oxivgl"

[package.metadata.docs.rs]
features = [
    "log-04",
    "png",
]
targets = ["x86_64-unknown-linux-gnu"]
no-default-features = true

[features]
default = []
lv-log = []
defmt = ["dep:defmt"]
esp-hal = ["dep:esp-hal"]
esp32 = ["esp-hal/esp32"]
log-04 = ["dep:log-04"]
png = ["dep:png"]

