[package]
edition = "2024"
name = "embassy-stm32c0-examples"
version = "0.1.0"
license = "MIT OR Apache-2.0"
publish = false

[dependencies]
# Configured for NUCLEO-C092RC. For other C0 chips change stm32c092rc accordingly.
# Note: C092RC lacks PC13; examples using that pin (button, button_exti) need a pin update.
embassy-stm32 = { version = "0.6.0", path = "../../embassy-stm32", features = [ "defmt", "time-driver-any", "stm32c092rc", "memory-x", "unstable-pac", "exti", "chrono"]  }
embassy-sync = { version = "0.8.0", path = "../../embassy-sync", features = ["defmt"] }
embassy-executor = { version = "0.10.0", path = "../../embassy-executor", features = ["platform-cortex-m", "executor-thread", "defmt"] }
embassy-time = { version = "0.5.1", path = "../../embassy-time", features = ["defmt", "defmt-timestamp-uptime", "tick-hz-32_768"] }

defmt = "1.0.1"
defmt-rtt = "1.0.0"

cortex-m = { version = "0.7.6", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7.0"
embedded-hal = "1.0"
panic-probe = { version = "1.0.0", features = ["print-defmt"] }
heapless = { version = "0.9", default-features = false }
chrono = { version = "^0.4", default-features = false}

[profile.release]
debug = 2

[package.metadata.embassy]
build = [
  { target = "thumbv6m-none-eabi", artifact-dir = "out/examples/stm32c0" }
]
